{% extends "app_layout.html" %}
{% set active = 'documents' %}
{% block title %}Upload Document — Bhat Overseas{% endblock %}

{% block content %}
<div class="page-head">
  <a href="{{ url_for('documents') }}" style="color:var(--text-3); font-size:12px;">← Back</a>
  <div style="margin-left:12px;">
    <div class="page-title">Upload Document</div>
    <div class="page-sub">Drop a passport, police report, or bill — we'll auto-scan it</div>
  </div>
</div>

<div class="doc-page" style="max-width:640px;">
  <form action="{{ url_for('upload_doc_post') }}" method="post" enctype="multipart/form-data" class="panel">
    <div class="form-group">
      <label>Client</label>
      <select name="client_id" required>
        {% for c in clients %}
        <option value="{{ c.id }}" {% if selected_client and selected_client == c.id %}selected{% endif %}>
          {{ c.ref_no }} — {{ c.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label>Document Type</label>
      <select name="doc_type" required>
        <option value="passport">Passport</option>
        <option value="police_report">Police Report (PCC)</option>
        <option value="medical_report">Medical Report</option>
        <option value="citizenship">Citizenship Certificate</option>
        <option value="electricity_bill">Electricity Bill</option>
        <option value="water_bill">Water Bill</option>
        <option value="vfs_receipt">VFS Receipt</option>
        <option value="kimlik_receipt">Kimlik Payment Slip</option>
        <option value="photographs">Photographs</option>
        <option value="flight_ticket">Flight Ticket</option>
      </select>
    </div>

    <div class="form-group">
      <label>File</label>
      <label class="scan-zone" for="docFile">
        <div class="ico">📎</div>
        <div class="lbl">Click to choose file</div>
        <div class="sub">JPG, PNG, PDF (max 10 MB)</div>
        <input id="docFile" type="file" name="file" required accept=".jpg,.jpeg,.png,.pdf" style="display:none;"
               onchange="document.getElementById('fname').textContent = this.files[0].name; document.getElementById('fname').style.display='block';" />
        <div id="fname" style="display:none; margin-top:10px; font-size:12px; color:var(--accent);"></div>
      </label>
    </div>

    <div style="display:flex; gap:8px; justify-content:flex-end;">
      <a class="btn btn-ghost" href="{{ url_for('documents') }}">Cancel</a>
      <button class="btn btn-primary" type="submit">Upload &amp; Auto-Scan</button>
    </div>
  </form>
</div>
{% endblock %}
