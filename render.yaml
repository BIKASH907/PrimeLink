# =====================================================
# Render.com Blueprint — auto-deploys from GitHub
# =====================================================
# How to use:
#   1. Push to GitHub
#   2. Go to https://render.com/dashboard
#   3. Click "New" -> "Blueprint"
#   4. Connect this repo -> Render reads this file & deploys automatically
# =====================================================
services:
  - type: web
    name: bhat-overseas
    runtime: python
    plan: free                # upgrade to "starter" later for always-on
    region: oregon            # change if you prefer a different region
    rootDir: backend          # all paths below are relative to backend/
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    autoDeploy: true          # redeploy on every git push
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a strong secret
      - key: DATABASE_URL
        fromDatabase:
          name: bhat-overseas-db
          property: connectionString
      - key: STORAGE_DIR
        value: /var/data/storage
      - key: OCR_BACKEND
        value: tesseract

databases:
  - name: bhat-overseas-db
    plan: free                # 256 MB free tier — fine for thousands of clients
    databaseName: bhat_overseas
    user: bhat
